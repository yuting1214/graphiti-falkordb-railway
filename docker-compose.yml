# Graphiti + FalkorDB — canonical two-service config.
#
# This mirrors what the Railway template provisions, using ONLY the official
# prebuilt images (no local build, no mounted config) so that `docker compose up`
# here is a faithful smoke-test of the deployed template.
#
#   FalkorDB  (falkordb/falkordb:latest)        -> the graph store, on :6379 (+ :3000 UI)
#   Graphiti  (zepai/knowledge-graph-mcp:...)   -> the MCP server, on :8000/mcp/
#
# The Graphiti image is the `:standalone` (FalkorDB-flavoured) build — the only
# published Graphiti image that speaks FalkorDB. We point it at the SEPARATE
# FalkorDB service via FALKORDB_URI, so the authoritative graph lives on that
# service's volume.
services:
  falkordb:
    image: falkordb/falkordb:latest
    restart: unless-stopped
    environment:
      # Lock the store down. On Railway this is an auto-generated sealed secret.
      - REDIS_ARGS=--requirepass ${FALKORDB_PASSWORD:-changeme}
      - BROWSER=${BROWSER:-1}          # set to 0 to drop the :3000 web UI
    ports:
      - "6379:6379"                    # graph protocol (private on Railway)
      - "3000:3000"                    # FalkorDB browser UI (optional public)
    volumes:
      - falkordb_data:/var/lib/falkordb/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${FALKORDB_PASSWORD:-changeme}", "-p", "6379", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  graphiti:
    image: zepai/knowledge-graph-mcp:standalone
    restart: unless-stopped
    depends_on:
      falkordb:
        condition: service_healthy
    environment:
      # --- LLM (you provide) ---
      - OPENAI_API_KEY=${OPENAI_API_KEY:?set OPENAI_API_KEY in .env}
      - MODEL_NAME=${MODEL_NAME:-gpt-5.4-mini-2026-03-17}
      - EMBEDDER_MODEL=${EMBEDDER_MODEL:-text-embedding-3-small}
      # --- FalkorDB connection (points at the official container above) ---
      - FALKORDB_URI=${FALKORDB_URI:-redis://falkordb:6379}
      - FALKORDB_PASSWORD=${FALKORDB_PASSWORD:-changeme}
      - FALKORDB_DATABASE=${FALKORDB_DATABASE:-default_db}
      # --- Graphiti behaviour ---
      - GRAPHITI_GROUP_ID=${GRAPHITI_GROUP_ID:-main}
      - SEMAPHORE_LIMIT=${SEMAPHORE_LIMIT:-10}   # lower this if you hit LLM 429s
    # The official MCP server has a DNS-rebinding host check that 421-rejects requests
    # behind a reverse proxy / public domain (getzep/graphiti #1205 — no env/config knob).
    # Patch FastMCP to disable it before launch. Harmless locally; REQUIRED on Railway
    # (and any proxied https deploy). This is the same start command the template uses.
    command:
      - uv
      - run
      - --no-sync
      - python
      - -c
      - |
        import mcp.server.fastmcp as f
        from mcp.server.transport_security import TransportSecuritySettings as T
        f.FastMCP.__init__ = (lambda _o: lambda self, *a, **k: _o(self, *a, **{**k, "transport_security": T(enable_dns_rebinding_protection=False)}))(f.FastMCP.__init__)
        import runpy; runpy.run_path("main.py", run_name="__main__")
    ports:
      - "8000:8000"                    # MCP server -> http://localhost:8000/mcp  (no trailing slash!)

volumes:
  falkordb_data:
    driver: local
